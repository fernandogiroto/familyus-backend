[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.sqlite3",
  "php82Extensions.mbstring",
  "php82Extensions.openssl",
  "php82Extensions.fileinfo",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.tokenizer",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "cp .env.example .env",
  "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "touch /app/database/database.sqlite && php artisan key:generate --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
